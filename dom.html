<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--The DOM (Document Object Model) is a programming interface (API) for web documents. It represents the structure of an HTML or XML page as a hierarchical tree of objects, allowing JavaScript to dynamically access, modify, and style the content of a webpage. -->
    <h2>check your age to cast vote</h2>
    <form action="">
    <input type="text" placeholder="enter your age" name="age"/>
    <input type="submit" value="submit" / onclick="result()"/>
    </form>
    <script>
        function result(){
            let myAge=document.getElementById('age').value; // it will get the value of input field
            if(myAge>=18){
                alert("you are eligible to vote");
            } else {
                alert("you are not eligible to vote");
            }
        }
    </script>
</body>
</html>
