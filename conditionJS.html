<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional statements in js</title>
</head>
<body>
    <script>
        // conditional statements in js : it is used to perform different actions based on different conditions

        // if statement
        let age=18;
        if(age>=18){
            console.log("you are eligible to vote");
        }

        // if else statement
        let marks=75;
        if(marks>=60){
            console.log("you are pass");
        }else{
            console.log("you are fail");
        }

        // if else if statement
        let percentage=85;
        if(percentage>=90){
            console.log("grade A");
        }else if(percentage>=80){
            console.log("grade B");
        }else if(percentage>=70){
            console.log("grade C");
        }else{
            console.log("grade D");
        }

        // switch statement
        let day=3;
        switch(day){
            case 1:
                console.log("monday");
                break;
            case 2:
                console.log("tuesday");
                break;
            case 3:
                console.log("wednesday");
                break;
            case 4:
                console.log("thursday");
                break;
            case 5:
                console.log("friday");
                break;
            case 6:
                console.log("saturday");
                break;
            case 7:
                console.log("sunday");
                break;
            default:
                console.log("invalid day");
        }
    </script>
</body>
</html>
