        //anonymous function in JavaScript is a function that does not have a name or an identifier.
        let msg=function(){
            console.log("This is an anonymous function");
         }
         msg();

        // short code for above function is arrow function
        let message=()=>{
            console.log("This is an arrow function");
        }
        message();

        // arrow function with multiple lines

        let msg1=(age)=>{
            if (age >= 18) {
                console.log("You are an adult");
            } else {
                console.log("You are not an adult");
            }
        }
        msg1(20);

        // call back function:- A callback function is a function that is passed as an argument to another function and is executed after a certain event or condition is met. It allows you to handle asynchronous operations and perform actions once a task is completed.
        function cal(a,b,callback){
        var1=a;
        console.log("first number is: "+var1);
        var2=b;
        console.log("second number is: "+var2);
        var result=var1+var2;  
        callback(result);  
        }
        function display(result){
            console.log("The result is: "+result);
        }

        cal(15,20,display);

        // call back function with setTimeout API method
        //The setTimeout() method in JavaScript schedules a callback function to be executed once after a specified delay in milliseconds.
        function greet(){
            document.writeln("Hello students, welcome to JavaScript class");
        }
        function loading(){
            document.writeln(" Data Loading...");
        }
        loading();
        setTimeout(greet, 2000);
        
        //calback hell or pyramid of doom
        //Callback hell, also known as the "pyramid of doom," is a situation in JavaScript where multiple nested callback functions make the code difficult to read, debug, and maintain


        // java script promises :JavaScript Promises make handling asynchronous operations like API calls, file loading, or time delays easier
        
        // promise stages.....
        // pending:- The initial state of a promise, where the asynchronous operation is still in progress and has not yet completed.
        // fulfilled:- The state of a promise when the asynchronous operation has completed successfully, and the promise has been resolved with a value.
        // rejected:- The state of a promise when the asynchronous operation has failed, and the promise has been rejected with a reason (error).   

        let promise=new Promise(function(resolve,reject){
            let myAge=23;
            if(myAge>=18){
                resolve("valid age to vote");
            } else {
                reject("wait for next year");
            }
        });
        promise.then(function(result){     // then always return true
            console.log(result);
        }).catch(function(error){         // catch always return false
            console.log(error);
        });

        // async await with error handling using try catch block
         
        async function productDetail(){
            try{
                let proRes=await fetch("https://fakestoreapi.com/products");
